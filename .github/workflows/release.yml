name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag override (leave blank for auto)'
        required: false
        default: ''

jobs:
  # ── Linux (musl static) ──────────────────────────────────────────
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native x86_64 musl build
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: aurorabox-linux-amd64
            native: true
          # Cross-compile aarch64 musl from x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: aurorabox-linux-arm64
            native: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.native == true
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 musl cross-compiler
        if: matrix.native == false
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          # Download pre-built aarch64-linux-musl cross toolchain
          curl -LO https://musl.cc/aarch64-linux-musl-cross.tgz
          tar xzf aarch64-linux-musl-cross.tgz
          echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Configure cross-compilation
        if: matrix.native == false
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-musl-gcc"
          EOF
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          ls -lh target/${{ matrix.target }}/release/aurorabox

      - name: Verify static linking
        run: |
          file target/${{ matrix.target }}/release/aurorabox
          # musl binaries should show "statically linked"

      - name: Package (tar.gz)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz aurorabox
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz.sha256

  # ── macOS ────────────────────────────────────────────────────────
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: aurorabox-macos-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: aurorabox-macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          ls -lh target/${{ matrix.target }}/release/aurorabox

      - name: Package (tar.gz)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz aurorabox
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz.sha256

  # ── Windows ──────────────────────────────────────────────────────
  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: aurorabox-windows-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          dir target\${{ matrix.target }}\release\aurorabox.exe

      - name: Package (zip)
        run: |
          cd target\${{ matrix.target }}\release
          Compress-Archive -Path aurorabox.exe -DestinationPath ${{ matrix.artifact }}.zip
          Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  ${{ matrix.artifact }}.zip" } > ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.zip
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.zip.sha256

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AuroraBox CLI ${{ github.ref_name }}"
          body: |
            ## AuroraBox CLI ${{ github.ref_name }}

            A command-line sing-box proxy manager with optional web UI.

            > **Linux binaries are statically linked with musl** — works on any Linux system regardless of GLIBC version.

            ### Downloads

            | Platform | Architecture | Type | Download |
            |----------|-------------|------|----------|
            | Linux | x86_64 | musl static | `aurorabox-linux-amd64.tar.gz` |
            | Linux | ARM64 | musl static | `aurorabox-linux-arm64.tar.gz` |
            | macOS | x86_64 | | `aurorabox-macos-amd64.tar.gz` |
            | macOS | ARM64 (Apple Silicon) | | `aurorabox-macos-arm64.tar.gz` |
            | Windows | x86_64 | | `aurorabox-windows-amd64.zip` |

            ### Install

            ```bash
            # Linux/macOS
            tar xzf aurorabox-linux-amd64.tar.gz
            sudo mv aurorabox /usr/local/bin/
            aurorabox --help

            # ARM64 SBC (Radxa, Raspberry Pi, etc.)
            tar xzf aurorabox-linux-arm64.tar.gz
            sudo mv aurorabox /usr/local/bin/

            # Windows - Extract aurorabox.exe and add to PATH
            ```

            Requires [sing-box](https://github.com/SagerNet/sing-box) installed separately.
            Run `aurorabox install` to auto-download sing-box.

            ### Quick Start
            ```bash
            aurorabox import "socks5://127.0.0.1:1080#My Proxy"
            aurorabox start --mode rule
            aurorabox web --port 8080
            ```
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
